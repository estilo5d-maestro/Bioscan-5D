# ============================================================
# BIOSCAN 5D · MODO UMBRAL — netlify.toml
# ============================================================

[build]
  publish = "."
  functions = "netlify/functions"

# Endpoints publicos (mas limpios que /.netlify/functions/...)
[[redirects]]
  from = "/api/calcular-perfil"
  to = "/.netlify/functions/calcular-perfil"
  status = 200

[[redirects]]
  from = "/api/enviar-rdstation"
  to = "/.netlify/functions/enviar-rdstation"
  status = 200

# Webhook publico para Hotmart (esta es la URL que se registra en Hotmart)
[[redirects]]
  from = "/api/webhook-hotmart"
  to = "/.netlify/functions/webhook-hotmart"
  status = 200

# Headers de seguridad basicos
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

